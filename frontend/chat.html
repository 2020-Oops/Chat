<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChatApp</title>
  <meta name="description" content="Real-time chat powered by FastAPI and WebSocket." />
  <link rel="stylesheet" href="./style.css" />
  <style>
    /* Basic modal styling */
    .modal { position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; }
    .modal-content { background: var(--surface); padding: 2rem; border-radius: var(--radius); width: 100%; max-width: 400px; box-shadow: var(--shadow-lg); }
    .modal-actions { display: flex; justify-content: flex-end; gap: 1rem; }
    .btn-icon { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 1.2rem; margin-left: auto; }
    .btn-icon:hover { color: var(--text); }
    .dm-header { display: flex; align-items: center; justify-content: space-between; }
    .chat-header { display: flex; justify-content: space-between; align-items: center; }
    .chat-header-info { display: flex; align-items: center; gap: 0.5rem; }
    .chat-header-actions { display: flex; align-items: center; }
    .btn-secondary { background: var(--surface-hover); color: var(--text); padding: 0.5rem 1rem; border: 1px solid var(--border); border-radius: var(--radius); cursor: pointer; font-size: 0.9rem; }
    .btn-secondary:hover { background: var(--border); }
    .btn-primary { background: var(--primary); color: white; padding: 0.5rem 1rem; border: none; border-radius: var(--radius); cursor: pointer; font-size: 0.9rem; }
    .btn-primary:hover { background: var(--primary-hover); }
    .btn-danger { background: #ef4444; color: white; padding: 0.5rem 1rem; border: none; border-radius: var(--radius); cursor: pointer; font-size: 0.9rem; }
    .btn-danger:hover { background: #dc2626; }
  </style>
</head>
<body>
  <div class="chat-layout">

    <!-- ── Sidebar ─────────────────────────────────── -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">💬 <span>Chat</span>App</div>
        <button class="btn-icon btn-sidebar-close" id="btn-sidebar-close" title="Close menu" aria-label="Close menu">&#10005;</button>
        <button class="btn-logout" id="btn-logout" title="Sign out" onclick="logout()">⏻</button>
      </div>

      <!-- Channels Removed for DM-only -->

      <!-- Groups -->
      <div class="room-list-header dm-header">
        Groups
        <button class="btn-icon" id="btn-create-group" title="Create Group" aria-label="Create Group">+</button>
      </div>
      <div class="search-container">
        <input type="text" id="search-groups" class="search-input" placeholder="Search groups...">
      </div>
      <ul class="room-list" id="group-list">
        <li class="dm-empty" id="group-empty">
          <span style="font-size:0.8rem;color:var(--text-muted);">No groups yet</span>
        </li>
      </ul>

      <!-- Direct Messages -->
      <div class="room-list-header dm-header" style="margin-top: 1rem;">
        Direct Messages
      </div>
      <div class="search-container">
        <input type="text" id="search-users" class="search-input" placeholder="Search users...">
      </div>
      <ul class="room-list" id="dm-list">
        <li class="dm-empty" id="dm-empty">
          <span style="font-size:0.8rem;color:var(--text-muted);">No other users yet</span>
        </li>
      </ul>

      <!-- Online users -->
      <div class="online-section">
        <div class="online-section-title">Online Default Room</div>
        <ul class="online-list" id="online-list"></ul>
      </div>
    </aside>

    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <!-- ── Modals ──────────────────────────────────── -->
    <div id="create-group-modal" class="modal" style="display: none;">
      <div class="modal-content">
        <h3>Create New Group</h3>
        <input type="text" id="new-group-name" placeholder="Group Name" class="message-input" style="margin-bottom: 1rem;">
        <div class="modal-actions">
          <button id="btn-cancel-group" class="btn-secondary">Cancel</button>
          <button id="btn-submit-group" class="btn-primary">Create</button>
        </div>
      </div>
    </div>
    
    <div id="add-member-modal" class="modal" style="display: none;">
      <div class="modal-content" style="max-width: 500px;">
        <h3>Add Member to Group</h3>
        <div class="search-container" style="padding: 0; margin-bottom: 1rem;">
          <input type="text" id="search-member-input" class="search-input" placeholder="Search by username...">
        </div>
        <ul id="search-member-results" class="room-list" style="max-height: 200px; overflow-y: auto; margin-bottom: 1rem;">
          <li class="dm-empty" id="member-search-empty">
            <span style="font-size:0.8rem;color:var(--text-muted);">Type to search users</span>
          </li>
        </ul>
        <div class="modal-actions">
          <button id="btn-cancel-member" class="btn-secondary">Close</button>
        </div>
      </div>
    </div>

    <!-- ── Header ─────────────────────────────────── -->
    <header class="chat-header">
      <div class="chat-header-info">
        <button class="btn-icon btn-sidebar" id="btn-sidebar" title="Open menu" aria-label="Open menu">&#9776;</button>
        <span class="chat-header-room-icon" id="header-icon"></span>
        <span class="chat-header-room" id="header-room">Select a user or group</span>
        <span class="chat-header-meta" id="header-meta"></span>
      </div>
      <div class="chat-header-actions">
        <button id="btn-add-member" class="btn-secondary" style="display: none; margin-right: 1rem;">+ Add Member</button>
        <button id="btn-leave-group" class="btn-secondary" style="display: none; margin-right: 1rem;">Leave Group</button>
        <button id="btn-delete-group" class="btn-danger" style="display: none; margin-right: 1rem;">Delete Group</button>
        <div class="connection-badge disconnected" id="conn-badge">
          <span class="badge-dot"></span>
          <span id="conn-text">Connecting…</span>
        </div>
      </div>
    </header>

    <!-- ── Messages ────────────────────────────────── -->
    <main class="messages-area" id="messages-area" aria-live="polite" aria-label="Chat messages"></main>

    <!-- ── Typing ──────────────────────────────────── -->
    <div class="typing-indicator" id="typing-indicator"></div>

    <!-- ── Input ──────────────────────────────────── -->
    <div class="message-input-area">
      <div class="message-input-wrap">
        <textarea
          id="message-input"
          class="message-input"
          placeholder="Select a user to chat..."
          disabled
          rows="1"
          aria-label="Message input"
          maxlength="2000"
        ></textarea>
      </div>
      <button class="btn-send" id="btn-send" aria-label="Send" disabled>➤</button>
    </div>

  </div>

  <script src="./config.js"></script>
  <script src="./app.js"></script>
</body>
</html>
