<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChatApp</title>
  <meta name="description" content="Real-time chat powered by FastAPI and WebSocket." />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="chat-layout">

    <!-- ── Sidebar ─────────────────────────────────── -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">💬 <span>Chat</span>App</div>
        <button class="btn-logout" id="btn-logout" title="Sign out" onclick="logout()">⏻</button>
      </div>

      <!-- Channels Removed for DM-only -->

      <!-- Direct Messages -->
      <div class="room-list-header dm-header">
        Direct Messages
      </div>
      <ul class="room-list" id="dm-list">
        <li class="dm-empty" id="dm-empty">
          <span style="font-size:0.8rem;color:var(--text-muted);">No other users yet</span>
        </li>
      </ul>

      <!-- Online users -->
      <div class="online-section">
        <div class="online-section-title">Online</div>
        <ul class="online-list" id="online-list"></ul>
      </div>
    </aside>

    <!-- ── Header ─────────────────────────────────── -->
    <header class="chat-header">
      <span class="chat-header-room-icon" id="header-icon"></span>
      <span class="chat-header-room" id="header-room">Select a user</span>
      <span class="chat-header-meta" id="header-meta"></span>
      <div class="connection-badge disconnected" id="conn-badge">
        <span class="badge-dot"></span>
        <span id="conn-text">Connecting…</span>
      </div>
    </header>

    <!-- ── Messages ────────────────────────────────── -->
    <main class="messages-area" id="messages-area" aria-live="polite" aria-label="Chat messages"></main>

    <!-- ── Typing ──────────────────────────────────── -->
    <div class="typing-indicator" id="typing-indicator"></div>

    <!-- ── Input ──────────────────────────────────── -->
    <div class="message-input-area">
      <div class="message-input-wrap">
        <textarea
          id="message-input"
          class="message-input"
          placeholder="Select a user to chat..."
          disabled
          rows="1"
          aria-label="Message input"
          maxlength="2000"
        ></textarea>
      </div>
      <button class="btn-send" id="btn-send" aria-label="Send" disabled>➤</button>
    </div>

  </div>

  <script src="./app.js"></script>
</body>
</html>
